# Workflow for SlimeVR Windows Offline Installer

name: SlimeVR Windows Offline Installer

on:
  push:
    paths:
      - 'windows/offline/**'
      - '.github/workflows/windows-offline.yml'
  pull_request:
    paths:
      - 'windows/offline/**'
      - '.github/workflows/windows-offline.yml'
  workflow_dispatch:

jobs:
  download:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download assets
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "windows/offline/assets"
          # VC++
          Invoke-WebRequest -Uri "https://aka.ms/vc14/vc_redist.x64.exe" -OutFile "windows/offline/assets/vc_redist.x64.exe"
          # JRE (matching web)
          Invoke-WebRequest -Uri "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.17+10/OpenJDK17U-jre_x64_windows_hotspot_17.0.17_10.zip" -OutFile "windows/offline/assets/OpenJDK17U-jre_x64_windows_hotspot_17.0.17_10.zip"
          # Server (latest)
          Invoke-WebRequest -Uri "https://github.com/SlimeVR/SlimeVR-Server/releases/latest/download/SlimeVR-win64.zip" -OutFile "windows/offline/assets/SlimeVR-Server-latest.zip"
          # Driver (latest)
          Invoke-WebRequest -Uri "https://github.com/SlimeVR/SlimeVR-OpenVR-Driver/releases/latest/download/slimevr-openvr-driver-win64.zip" -OutFile "windows/offline/assets/slimevr-openvr-driver-win64.zip"
          # Feeder (latest)
          Invoke-WebRequest -Uri "https://github.com/SlimeVR/SlimeVR-Feeder-App/releases/latest/download/SlimeVR-Feeder-App-win64.zip" -OutFile "windows/offline/assets/SlimeVR-Feeder-App-latest.zip"
      - name: Upload assets
        uses: actions/upload-artifact@v6
        with:
          name: offline-assets
          path: windows/offline/assets

  build:
    needs: download
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Download assets
        uses: actions/download-artifact@v6
        with:
          name: offline-assets
          path: windows/offline/assets
      - name: Create NSIS installer
        uses: joncloud/makensis-action@v5.0
        with:
          script-file: windows/offline/slimevr_offline_installer.nsi
      - name: Upload the installer as artifact
        uses: actions/upload-artifact@v6
        with:
          name: "slimevr_offline_installer"
          path: windows/offline/slimevr_offline_installer.exe
      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          generate_release_notes: true
          files: "windows/offline/slimevr_offline_installer.exe"
