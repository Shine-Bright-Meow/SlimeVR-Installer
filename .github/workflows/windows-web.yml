# Workflow based on https://github.com/joncloud/makensis-action-test/blob/publish/.github/workflows/main.yml

name: SlimeVR Windows Web Installer

on: [ push, pull_request, workflow_dispatch ]

env:
  DRIVER_VERSION: "v5.0.0-rc.1" # https://github.com/SlimeVR/SlimeVR-OpenVR-Driver/tags
  JRE_VERSION: "17.0.11+9" # https://github.com/adoptium/temurin17-binaries/tags
  SERVER_VERSION: "v20.0.0-rc.1" # https://github.com/SlimeVR/SlimeVR-Server/tags

jobs:


  build:
    runs-on: windows-2022

    env:
      # The directory of the web installer project
      WINDOWS_WEB_DIR: ${{ github.workspace }}/windows/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Download assets
        shell: powershell
        run: |
          $DRIVER_VERSION = "${{ env.DRIVER_VERSION }}"
          $JRE_VERSION = "${{ env.JRE_VERSION }}"
          $SERVER_VERSION = "${{ env.SERVER_VERSION }}"
          $assetsDir = "${{ env.WINDOWS_WEB_DIR }}/assets"
          New-Item -ItemType Directory -Force -Path $assetsDir
          # VC++
          Invoke-WebRequest -Uri "https://aka.ms/vc14/vc_redist.x64.exe" -OutFile "$assetsDir/vc_redist.x64.exe"
          # JRE
          $versionFixed = $JRE_VERSION -replace '\+', '_'
          Invoke-WebRequest -Uri "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-$JRE_VERSION/OpenJDK17U-jre_x64_windows_hotspot_$versionFixed.zip" -OutFile "$assetsDir/jre.zip"
          # Server
          Invoke-WebRequest -Uri "https://github.com/SlimeVR/SlimeVR-Server/releases/download/$SERVER_VERSION/SlimeVR-win64.zip" -OutFile "$assetsDir/SlimeVR-Server.zip"
          # Driver
          Invoke-WebRequest -Uri "https://github.com/SlimeVR/SlimeVR-OpenVR-Driver/releases/download/$DRIVER_VERSION/slimevr-openvr-driver-x64-windows-static-md.zip" -OutFile "$assetsDir/slimevr-openvr-driver-x64-windows-static-md.zip"
      - name: Update NSI defines
        shell: powershell
        run: |
          $JRE_VERSION = "${{ env.JRE_VERSION }}"
          $SERVER_VERSION = "${{ env.SERVER_VERSION }}"
          $DRIVER_VERSION = "${{ env.DRIVER_VERSION }}"
          $content = Get-Content -Path "${{ env.WINDOWS_WEB_DIR }}/slimevr_web_installer.nsi" -Raw
          $content = $content -replace '!define JREVersion "PLACEHOLDER_VERSION"', "!define JREVersion `"${JRE_VERSION}`""
          $content = $content -replace '!define SVRServerVersion "PLACEHOLDER_VERSION"', "!define SVRServerVersion `"${SERVER_VERSION}`""
          $content = $content -replace '!define SVRDriverVersion "PLACEHOLDER_VERSION"', "!define SVRDriverVersion `"${DRIVER_VERSION}`""
          $content = $content -replace 'OutFile "OUTFILE_NAME"', "OutFile `"slimevr_${SERVER_VERSION}_offline_installer.exe`""
          Set-Content -Path "${{ env.WINDOWS_WEB_DIR }}/slimevr_web_installer.nsi" -Value $content -NoNewline

      - name: Create NSIS installer
        uses: joncloud/makensis-action@v5.0
        with:
          script-file: ${{ env.WINDOWS_WEB_DIR }}/slimevr_web_installer.nsi

      - name: Upload the installer as a build artifact
        uses: actions/upload-artifact@v6
        with:
          # Artifact name
          name: "slimevr_web_installer" # optional, default is artifact
          # A file, directory or wildcard pattern that describes what to upload
          path: ${{ env.WINDOWS_WEB_DIR }}/slimevr_${{ env.SERVER_VERSION }}_offline_installer.exe
